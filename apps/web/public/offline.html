<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KambaFeira — Sem ligação</title>
  <style>
    body { font-family: sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: #f9fafb; }
    .caixa { text-align: center; padding: 2rem; }
    h1 { color: #dc2626; font-size: 1.5rem; margin-bottom: .5rem; }
    p { color: #6b7280; margin-bottom: 1.5rem; }
    button { background: #dc2626; color: white; border: none; padding: .75rem 1.5rem; border-radius: .5rem; cursor: pointer; font-size: 1rem; }
  </style>
</head>
<body>
  <div class="caixa">
    <h1>Sem ligação à internet</h1>
    <p>Verifica a tua ligação e tenta novamente.</p>
    <button onclick="location.reload()">Tentar novamente</button>
  </div>
</body>
</html>
